<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');

          window.history.replaceState(
            null,
            null,
            decoded
          );
        }
      })(window.location);
    </script>

    <link rel="icon" type="image/svg+xml" href="/education.png" />

    <meta
      name="viewport"
      content="initial-scale=1, width=device-width"
    />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    />

    <title>Rachel Lucena, D.Sc</title>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
